databases:
  - name: supplier-cashflow-db
    plan: basic-256mb
    databaseName: supplier_cashflow
    user: cashflow_user
    region: frankfurt

services:
  - type: web
    name: supplier-cashflow
    runtime: node
    plan: starter
    region: frankfurt
    buildCommand: npm install && npx prisma generate && cd client && npm install && npx vite build && cd ..
    startCommand: mkdir -p uploads/guests && node prisma/migrate-fields.js && npx prisma db push --accept-data-loss && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: supplier-cashflow-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NODE_ENV
        value: production
      - key: GUEST_PASSWORD
        sync: false
